name: mealgro_rider_app
description: "Mealgro Rider App — on-demand food delivery rider client."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ───────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # ── Navigation ─────────────────────────────────────────────────
  go_router: ^13.2.4

  # ── Models / Serialization ─────────────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ── Networking (used in Milestone 2) ───────────────────────────
  dio: ^5.4.3

  # ── Storage ────────────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # ── UI Helpers ─────────────────────────────────────────────────
  pinput: ^5.0.0 # OTP / PIN input
  shimmer: ^3.0.0 # skeleton loaders
  cached_network_image: ^3.3.1 # rider avatar
  lottie: ^3.1.0 # Lottie JSON animations
  flutter_svg: ^2.0.9 # SVG assets
  gap: ^3.0.1 # clean spacing widget
  flutter_screenutil: ^5.9.3 # responsive scaling (.w .h .sp .r)

  # ── Media ──────────────────────────────────────────────────────
  image_picker: ^1.0.8 # change profile picture

  # ── Location (permissions M1, logic M2) ────────────────────────
  geolocator: ^11.0.0

  # ── Utilities ──────────────────────────────────────────────────
  intl: ^0.19.0 # date + NGN currency formatting
  connectivity_plus: ^6.0.3 # offline banner

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.9
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/animations/
